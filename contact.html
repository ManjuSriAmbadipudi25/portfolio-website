<section>

<h2>Send a Message</h2>

<form aria-label="Contact Form">

<p>
<label for="name">Name</label>
</p>

<input
type="text"
id="name"
name="name"
required>

<p>
<label for="email">Email</label>
</p>

<input
type="email"
id="email"
name="email"
required>

<p>
<label for="message">Message</label>
</p>

<textarea
id="message"
name="message"
rows="5"
required></textarea>

<br><br>

<button type="submit">
Send Message
</button>

</form>
